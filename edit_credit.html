<!DOCTYPE html>
<html>

<head>

    <title>Edit Customer Credit</title>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body class="bg-light">

<div class="container mt-4">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow">

                <div class="card-header bg-warning">

                    <h4>Edit Customer Credit</h4>

                </div>

                <div class="card-body">

                    <form method="POST">

                        <div class="mb-3">

                            <label>Customer Name</label>

                            <input
                                type="text"
                                name="customer_name"
                                class="form-control"
                                value="{{ credit['customer_name'] }}"
                                required>

                        </div>

                        <div class="mb-3">

                            <label>Contact Number</label>

                            <input
                                type="text"
                                name="contact"
                                class="form-control"
                                value="{{ credit['contact'] }}"
                                required>

                        </div>

                        <div class="mb-3">

                            <label>Item</label>

                            <input
                                type="text"
                                name="item"
                                class="form-control"
                                value="{{ credit['item'] }}"
                                required>

                        </div>

                        <div class="mb-3">

                            <label>Total Price</label>

                            <input
                                type="number"
                                step="0.01"
                                id="total_price"
                                name="total_price"
                                class="form-control"
                                value="{{ credit['total_price'] }}"
                                onkeyup="calculateRemaining()"
                                required>

                        </div>

                        <div class="mb-3">

                            <label>Amount Paid</label>

                            <input
                                type="number"
                                step="0.01"
                                id="paid"
                                name="paid"
                                class="form-control"
                                value="{{ credit['paid'] }}"
                                onkeyup="calculateRemaining()"
                                required>

                        </div>

                        <div class="mb-3">

                            <label>Remaining Amount</label>

                            <input
                                type="text"
                                id="remaining"
                                class="form-control"
                                value="{{ credit['remaining'] }}"
                                readonly>

                        </div>

                        <button
                            type="submit"
                            class="btn btn-warning w-100">

                            Update Customer Credit

                        </button>

                    </form>

                    <hr>

                    <a
                        href="/customer_credit"
                        class="btn btn-secondary w-100">

                        ← Back to Customer Credit

                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

<script>

function calculateRemaining(){

    let total = parseFloat(document.getElementById("total_price").value) || 0;

    let paid = parseFloat(document.getElementById("paid").value) || 0;

    let remaining = total - paid;

    if(remaining < 0){

        remaining = 0;

    }

    document.getElementById("remaining").value = remaining;

}

</script>

</body>

</html>
