<!DOCTYPE html>
<html>

<head>

    <title>Dashboard</title>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body class="bg-light">

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <div>

            <h3>{{ shop }}</h3>

            <p class="text-secondary">

                Welcome, {{ user }}

            </p>

        </div>

        <a href="/logout" class="btn btn-danger">

            Logout

        </a>

    </div>



    <!-- CARDS -->

    <div class="row">

        <div class="col-md-3 mb-3">

            <div class="card text-center shadow h-100">

                <div class="card-body">

                    <h5>Total Stock</h5>

                    <h2>{{ total_stock }}</h2>

                </div>

            </div>

        </div>



        <div class="col-md-3 mb-3">

            <div class="card text-center shadow h-100">

                <div class="card-body">

                    <h5>Customer Credit</h5>

                    <h2>{{ total_credit }}</h2>

                </div>

            </div>

        </div>



        <div class="col-md-3 mb-3">

            <div class="card text-center shadow h-100">

                <div class="card-body">

                    <h5>Total Payment</h5>

                    <h2>₹ {{ total_payment }}</h2>

                </div>

            </div>

        </div>



        <div class="col-md-3 mb-3">

            <div class="card text-center shadow h-100">

                <div class="card-body">

                    <h5>Pending</h5>

                    <h2>₹ {{ pending }}</h2>

                </div>

            </div>

        </div>

    </div>



    <!-- STOCK -->

    <div class="card shadow mt-4">

        <div class="card-header">

            <b>Stock</b>

        </div>

        <div class="card-body">

            <a href="/add_stock" class="btn btn-primary w-100 mb-2">

                Add Stock

            </a>

            <a href="/stock" class="btn btn-outline-primary w-100">

                View Stock

            </a>

        </div>

    </div>



    <!-- CUSTOMER CREDIT -->

    <div class="card shadow mt-4">

        <div class="card-header">

            <b>Customer Credit</b>

        </div>

        <div class="card-body">

            <a href="/add_credit" class="btn btn-success w-100 mb-2">

                Add Customer Credit

            </a>

            <a href="/customer_credit" class="btn btn-outline-success w-100">

                View Customer Credit

            </a>

        </div>

    </div>



    <!-- PAYMENT -->

    <div class="card shadow mt-4 mb-4">

        <div class="card-header">

            <b>Payment</b>

        </div>

        <div class="card-body">

            <a href="/history" class="btn btn-warning w-100">

                Payment History

            </a>

        </div>

    </div>

</div>

</body>

</html>
