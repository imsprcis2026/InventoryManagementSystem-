<!DOCTYPE html>
<html>

<head>

    <title>Add Stock</title>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body class="bg-light">

<div class="container mt-4">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow">

                <div class="card-header bg-primary text-white">

                    <h4>Add Stock</h4>

                </div>

                <div class="card-body">

                    <form method="POST">

                        <div class="mb-3">

                            <label class="form-label">

                                Supplier Name

                            </label>

                            <input
                                type="text"
                                name="supplier"
                                class="form-control"
                                placeholder="Enter Supplier Name"
                                required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">

                                Item Name

                            </label>

                            <input
                                type="text"
                                name="item"
                                class="form-control"
                                placeholder="Enter Item Name"
                                required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">

                                Quantity

                            </label>

                            <input
                                type="text"
                                name="quantity"
                                class="form-control"
                                placeholder="Example : 5 kg / 2 L / 10 pcs"
                                required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">

                                Price

                            </label>

                            <input
                                type="number"
                                step="0.01"
                                name="price"
                                class="form-control"
                                placeholder="Enter Price"
                                required>

                        </div>

                        <button
                            type="submit"
                            class="btn btn-primary w-100">

                            Save Stock

                        </button>

                    </form>

                    <hr>

                    <a
                        href="/dashboard"
                        class="btn btn-secondary w-100">

                        ← Back to Dashboard

                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
