<!DOCTYPE html>
<html>

<head>

    <title>Payment</title>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body class="bg-light">

<div class="container mt-4">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow">

                <div class="card-header bg-success text-white">

                    <h4>Customer Payment</h4>

                </div>

                <div class="card-body">

                    <table class="table table-bordered">

                        <tr>

                            <th>Customer</th>

                            <td>{{ customer["customer_name"] }}</td>

                        </tr>

                        <tr>

                            <th>Contact</th>

                            <td>{{ customer["contact"] }}</td>

                        </tr>

                        <tr>

                            <th>Item</th>

                            <td>{{ customer["item"] }}</td>

                        </tr>

                        <tr>

                            <th>Total Amount</th>

                            <td>₹ {{ customer["total_price"] }}</td>

                        </tr>

                        <tr>

                            <th>Already Paid</th>

                            <td>₹ {{ customer["paid"] }}</td>

                        </tr>

                        <tr>

                            <th>Remaining</th>

                            <td class="text-danger">

                                ₹ {{ customer["remaining"] }}

                            </td>

                        </tr>

                    </table>

                    <form method="POST">

                        <div class="mb-3">

                            <label>

                                Payment Amount

                            </label>

                            <input
                                type="number"
                                step="0.01"
                                max="{{ customer['remaining'] }}"
                                name="payment_amount"
                                class="form-control"
                                placeholder="Enter Amount"
                                required>

                        </div>

                        <button
                            type="submit"
                            class="btn btn-success w-100">

                            Save Payment

                        </button>

                    </form>

                    <hr>

                    <a
                        href="/customer_credit"
                        class="btn btn-secondary w-100">

                        ← Back to Customer Credit

                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
